name: faslo
description: Faslo — Intermittent Fasting Tracker
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.2.3

  # Charts
  fl_chart: ^0.68.0

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Fonts
  google_fonts: ^6.2.1

  # Utils
  intl: ^0.20.2
  uuid: ^4.4.0
  share_plus: ^9.0.0
  path_provider: ^2.1.3

  # Animation
  confetti: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/fonts/